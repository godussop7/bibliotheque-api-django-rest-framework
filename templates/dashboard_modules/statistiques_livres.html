{% load i18n %} {% load static %}

<div class="stats-container">
  <div class="stat-card">
    <h3>{{ total_livres }}</h3>
    <p>Total Livres</p>
  </div>
  <div class="stat-card">
    <h3>{{ total_auteurs }}</h3>
    <p>Total Auteurs</p>
  </div>
  <div class="stat-card">
    <h3>{{ total_emprunts }}</h3>
    <p>Total Emprunts</p>
  </div>
  <div class="stat-card">
    <h3>{{ lecteurs_actifs }}</h3>
    <p>Lecteurs Actifs</p>
  </div>
</div>

<style>
  .stats-container {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    margin-bottom: 40px;
  }

  .stat-card {
    flex: 1;
    min-width: 200px;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    text-align: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(0, 0, 0, 0.05);
    backdrop-filter: blur(10px);
  }

  .stat-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
    border-color: rgba(102, 126, 234, 0.2);
  }

  .stat-card h3 {
    color: #667eea;
    font-size: 48px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-card p {
    color: #718096;
    font-size: 14px;
    font-weight: 500;
    margin: 12px 0 0 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
